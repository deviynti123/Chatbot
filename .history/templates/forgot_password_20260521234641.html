<!DOCTYPE html>
<html>
<head>
<title>Nara – Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background: linear-gradient(
        135deg,
        #dbeafe,
        #f5d0fe
    );
}

/* CARD */

.card{
    width:850px;
    height:520px;

    background:white;

    border-radius:30px;

    overflow:hidden;

    display:flex;

    box-shadow:
    0 25px 50px rgba(124,111,212,0.2);
}

/* LEFT */

.left{
    width:45%;

    background: linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;

    padding:40px;

    position:relative;
}

.left::before{
    content:'';

    position:absolute;

    width:280px;
    height:280px;

    border:35px solid rgba(255,255,255,0.08);

    border-radius:50%;

    top:-90px;
    left:-90px;
}

.left::after{
    content:'';

    position:absolute;

    width:200px;
    height:200px;

    border:25px solid rgba(255,255,255,0.06);

    border-radius:50%;

    bottom:-70px;
    right:-70px;
}

.left img{
    width:130px;
    margin-bottom:25px;

    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }
}

.left h2{
    font-size:32px;
    margin-bottom:10px;
}

.left p{
    font-size:15px;
    opacity:0.8;
    text-align:center;
    line-height:1.7;
}

/* RIGHT */

.right{
    flex:1;

    padding:60px;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right h1{
    color:#5b4b8a;
    font-size:38px;
    margin-bottom:10px;
}

.right p{
    color:#9d8ec2;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;

    margin-bottom:8px;

    color:#9d8ec2;

    font-size:13px;
    font-weight:600;

    letter-spacing:1px;

    text-transform:uppercase;
}

.input-wrap{
    display:flex;
    align-items:center;

    background:#f5f3ff;

    border:1px solid rgba(124,111,212,0.15);

    border-radius:14px;

    padding:0 14px;

    transition:0.3s;
}

.input-wrap:focus-within{
    border-color:#8b5cf6;

    background:white;

    box-shadow:
    0 0 0 4px rgba(139,92,246,0.1);
}

.input-wrap span{
    margin-right:10px;
    font-size:18px;
}

.input-wrap input{
    width:100%;

    border:none;
    outline:none;

    background:none;

    padding:16px 0;

    font-size:15px;

    font-family:inherit;
}

/* BUTTON */

button{
    width:100%;

    padding:16px;

    border:none;

    border-radius:16px;

    background: linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    margin-top:10px;

    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(139,92,246,0.35);
}

/* LINK */

.back{
    margin-top:20px;

    text-align:center;
}

.back a{
    color:#8b5cf6;
    text-decoration:none;
    font-weight:600;
}

.back a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

    <!-- LEFT -->

    <div class="left">

        <img src="/static/chatbot.gif">

        <h2>Lupa Password?</h2>

        <p>
            Tenang 😊<br>
            Masukkan username dan password baru Anda.
        </p>

    </div>

    <!-- RIGHT -->

    <div class="right">

        <h1>Reset Password</h1>

        <p>
            Silakan ubah password akun Nara Anda.
        </p>

        <form method="POST">

            <div class="input-box">

                <label>Username</label>

                <div class="input-wrap">

                    <span>👤</span>

                    <input
                        type="text"
                        name="username"
                        placeholder="Masukkan username"
                        required
                    >

                </div>

            </div>

            <div class="input-box">

                <label>Password Baru</label>

                <div class="input-wrap">

                    <span>🔒</span>

                    <input
                        type="password"
                        name="password"
                        placeholder="Masukkan password baru"
                        required
                    >

                </div>

            </div>

            <button type="submit">
                Simpan Password Baru →
            </button>

        </form>

        <div class="back">
            <a href="/login">
                ← Kembali ke Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
