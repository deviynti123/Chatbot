<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
    font-family:'Segoe UI';
    background:#f5f3ff;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:400px;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#7c6fd4;
    margin-bottom:10px;
}

p{
    color:#777;
    margin-bottom:25px;
}

input{
    width:100%;

    padding:14px;

    margin-bottom:15px;

    border-radius:10px;

    border:1px solid #ddd;

    font-size:14px;
}

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background: linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );

    color:white;

    font-size:15px;

    cursor:pointer;
}

a{
    display:block;

    margin-top:15px;

    text-align:center;

    color:#7c6fd4;

    text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

    <h1>Reset Password</h1>

    <p>Masukkan username dan password baru.</p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password Baru"
            required
        >

        <button type="submit">
            Simpan Password
        </button>

    </form>

    <a href="/login">
        ← Kembali ke Login
    </a>

</div>

</body>
</html>
