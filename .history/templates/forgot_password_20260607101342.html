<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          purple: '#7c6fd4',
          pink:   '#c084b8',
        },
        fontFamily: {
          jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
        },
      }
    }
  }
</script>
<link rel="stylesheet" href="style.css">
</head>

<body class="font-jakarta h-screen flex justify-center items-center bg-[#f5f3ff]">

  <div class="w-[400px] bg-white p-10 rounded-2xl shadow-card">

    <h1 class="text-purple text-2xl font-bold mb-2.5">Reset Password</h1>
    <p class="text-gray-400 mb-6">Masukkan username dan password baru.</p>

    <form method="POST">

      <input
        type="text"
        name="username"
        placeholder="Username"
        required
        class="w-full px-4 py-3.5 mb-4 rounded-xl border border-gray-200 text-sm outline-none focus:border-purple transition"
      >

      <input
        type="password"
        name="password"
        placeholder="Password Baru"
        required
        class="w-full px-4 py-3.5 mb-4 rounded-xl border border-gray-200 text-sm outline-none focus:border-purple transition"
      >

      <button type="submit"
        class="w-full py-3.5 border-none rounded-xl text-white font-semibold text-base cursor-pointer grad-purple transition hover:opacity-90 hover:-translate-y-0.5">
        Simpan Password
      </button>

    </form>

    <a href="/login" class="block mt-4 text-center text-purple no-underline text-sm hover:underline">
      ← Kembali ke Login
    </a>

  </div>

</body>
</html>
