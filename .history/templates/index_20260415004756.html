<!DOCTYPE html>
<html>
<head>
<title>Nara Chatbot</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
 background: linear-gradient(
  135deg,
  #c7d2fe 100%,
  #ccd1fb 91%,
  #e1caf1 %,
  #f2c5e8 70%,
  #ffc2e2 81%
);
}

/* CONTAINER */
.container {
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TITLE */
h1 {
  margin-bottom:20px;
  color:#374151;
}

/* GIF */
.robot {
  width:200px;
  margin:20px 0;
}

/* BUTTON */
button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:20px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <!-- TEXT ATAS -->
  <h1>Meet your Nara</h1>

  <!-- GIF ROBOT -->
  <img src="/static/chatbot.gif" class="robot">

  <!-- BUTTON -->
  <button onclick="startChat()">Let’s get started</button>

</div>

<script>
function startChat(){
  window.location.href = "/chat";
}
</script>

</body>
</html>
