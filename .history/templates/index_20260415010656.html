<!DOCTYPE html>
<html>
<head>
<title>Nara Chatbot</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(
  to bottom,
  #C7D2FE 4%,
  rgba(204, 209, 251, 0.91) 9%,
  rgba(225, 202, 241, 0.53) 46%,
  rgba(242, 197, 232, 0.23) 70%,
  rgba(255, 194, 226, 0) 81%
);
}

/* CONTAINER */
.container {
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ANIMASI SLIDE IN */
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* TITLE */
h1 {
  margin-bottom:20px;
  color: #5b4b8a;
  animation: slideUp 0.7s ease forwards;
}

/* GIF */
.robot {
  width:200px;
  margin:20px 0;
  animation: slideUp 0.9s ease forwards;
}

/* BUTTON */
button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:20px;
  background: linear-gradient(135deg, #7c6fd4, #c084b8);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(124, 111, 212, 0.3);
  animation: slideUp 1.1s ease forwards;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #6a5dc4, #b072a8);
  box-shadow: 0 6px 25px rgba(124, 111, 212, 0.6);
  filter: brightness(1.15);
}

button:active {
  transform: scale(0.97);
  filter: brightness(1.3);
  box-shadow: 0 0 30px rgba(192, 132, 184, 0.9);
}
</style>
</head>

<body>

<div class="container">

  <!-- TEXT ATAS -->
  <h1>Meet your Nara</h1>

  <!-- GIF ROBOT -->
  <img src="/static/chatbot.gif" class="robot">

  <!-- BUTTON -->
  <button onclick="startChat()">Let's get started</button>

</div>

<script>
function startChat(){
  window.location.href = "/chat";
}
</script>

</body>
</html>
